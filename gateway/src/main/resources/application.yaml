server:
  port: 8088
spring:
  application:
    name: gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: risk-service
          uri: lb://risk-service
          predicates:
            - Path=/api/v1/risks/**
        - id: policy-service
          uri: lb://policy-service
          predicates:
            - Path=/api/v1/policies/**
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/v1/customers/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**
        - id: underwriting-service
          uri: lb://underwriting-service
          predicates:
            - Path=/api/v1/underwriting/**
        - id: quotation-service
          uri: lb://quotation-service
          predicates:
            - Path=/api/v1/quotations/**
        - id: proposal-service
          uri: lb://proposal-service
          predicates:
            - Path=/api/v1/proposals/**
        - id: claim-service
          uri: lb://claim-service
          predicates:
            - Path=/api/v1/claims/**
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/v1/billings/**
        - id: audit-service
          uri: lb://audit-service
          predicates:
            - Path=/api/v1/audit/**
eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
management:
  endpoints:
    web:
      exposure:
        include: health,info