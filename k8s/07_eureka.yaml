apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: insureflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
        - name: eureka
          image: erlanggariansyah/insureflow-eureka:latest
          ports:
            - containerPort: 8761
          env:
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: insureflow
spec:
  selector:
    app: eureka
  ports:
    - port: 8761
      targetPort: 8761
  type: NodePort