apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: insureflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: erlanggariansyah/insureflow-gateway:latest
          ports:
            - containerPort: 8088
          env:
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: "http://eureka:8761/eureka"
            - name: SERVER_PORT
              value: "8088"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: insureflow
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8088
      targetPort: 8088
  type: NodePort