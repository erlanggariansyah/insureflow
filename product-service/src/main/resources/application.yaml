server:
  port: 8080
spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://postgres-product-service:5432/products
    username: insureflow
    password: insureflow
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  data:
    redis:
      host: redis-product-service
      port: 6379
      database: 0
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
logging:
  level:
    root: INFO
    org.flywaydb: DEBUG
    org.springframework.orm.jpa: DEBUG
    org.springframework.jdbc: DEBUG